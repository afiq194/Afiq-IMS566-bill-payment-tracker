    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .navbar-custom { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; }
        .navbar-custom .navbar-brand { color: #0f172a; font-weight: 700; }
        .navbar-custom .nav-link { color: #64748b; font-weight: 500; }
        .navbar-custom .nav-link.active { color: #6366f1 !important; }
        
        .card-custom { border-radius: 24px; border: none; background-color: #ffffff; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .table-custom th { font-weight: 600; color: #64748b; background-color: #f8fafc; border: none; padding: 16px; }
        .table-custom td { padding: 16px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }
        
        .btn-add-bill { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; font-weight: 600; border: none; padding: 10px 20px; border-radius: 12px; transition: all 0.3s ease; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2); }
        .btn-add-bill:hover { background: linear-gradient(135deg, #4338ca, #4f46e5); color: white; transform: translateY(-2px); box-shadow: 0 6px 12px -1px rgba(99, 102, 241, 0.3); }
        
        .badge-paid { background-color: #ecfdf5; color: #059669; border-radius: 8px; padding: 6px 12px; font-weight: 600; font-size: 0.85rem; }
        .badge-pending { background-color: #fffbeb; color: #d97706; border-radius: 8px; padding: 6px 12px; font-weight: 600; font-size: 0.85rem; }
        .badge-overdue { background-color: #fff1f2; color: #e11d48; border-radius: 8px; padding: 6px 12px; font-weight: 600; font-size: 0.85rem; }
        
        .btn-delete { background-color: #fff1f2; color: #e11d48; border: none; padding: 8px 12px; border-radius: 8px; transition: all 0.2s ease; }
        .btn-delete:hover { background-color: #ffe4e6; color: #be123c; transform: scale(1.05); }

        .chart-card-custom { border-radius: 24px; border: none; background-color: #ffffff; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .chart-wrapper { position: relative; width: 100%; height: 280px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>

            </div>
        </div>
    </div>

        function getBillDateObject(bill) {
            const dateStr = bill.date || bill.dueDate;
            if (dateStr && !isNaN(Date.parse(dateStr))) {
                return new Date(dateStr);
            }
            
            const period = (bill.period || "current").toLowerCase();
            if (period === "june" || period === "jun" || period === "current") return new Date("2026-06-15");
            if (period === "may") return new Date("2026-05-15");
            if (period === "previous" || period.includes("apr")) return new Date("2026-04-15");
            if (period.includes("mar")) return new Date("2026-03-15");
            if (period.includes("feb")) return new Date("2026-02-15");
            if (period.includes("jan")) return new Date("2026-01-15");
            
            return new Date(0); 
        }

        function renderBillsTable() {
            initDataIfEmptyInList();
            let bills = JSON.parse(localStorage.getItem("storedBills")) || [];
            const selectedPeriod = document.getElementById("listPeriodFilter").value;
            const tbody = document.getElementById("billsTableBody");
            
            tbody.innerHTML = "";

            bills.sort((a, b) => {
                return getBillDateObject(b) - getBillDateObject(a);
            });

            let monthsLabels = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'June'];
            let stackedData = {
                'Paid': [0, 0, 0, 0, 0, 0],
                'Pending': [0, 0, 0, 0, 0, 0],
                'Overdue': [0, 0, 0, 0, 0, 0]
            };
            let providerCounts = {};

            bills.forEach(bill => {
                let bId = bill.id;
                let bName = bill.name || bill.billName || "New Bill";
                let bProvider = bill.provider || bill.category || "General";
                let bAmount = parseFloat(bill.amount || bill.billAmount) || 0;
                let bDate = bill.date || bill.dueDate || "June 2026";
                let bStatus = bill.status || "Paid";
                let bPeriod = bill.period || "current";

                if (bDate.includes("-") && bDate.length === 10) {
                    const parts = bDate.split("-");
                    const months = ["Jan", "Feb", "Mar", "Apr", "May", "June", "July", "Aug", "Sept", "Oct", "Nov", "Dec"];
                    const monthIndex = parseInt(parts[1], 10) - 1;
                    if (monthIndex >= 0 && monthIndex < 12) {
                        bDate = `${months[monthIndex]} ${parts[2]}, ${parts[0]}`;
                    }
                }

                let shouldInclude = false;
                if (selectedPeriod === "annual") {
                    shouldInclude = true;
                } else {
                    const p = bPeriod.toLowerCase();
                    const s = selectedPeriod.toLowerCase();
                    
                    if (s === "current" && (p === "june" || p === "jun" || p === "-06" || p === "current")) {
                        if (bill.date && (bill.date.includes("May") || bill.date.includes("-05"))) {
                            shouldInclude = false;
                        } else {
                            shouldInclude = true;
                        }
                    }
                    
                    if (s === "may" && (p.includes("may") || p.includes("-05") || (p === "current" && (bill.date && (bill.date.includes("May") || bill.date.includes("-05")))))) shouldInclude = true;
                    if (s === "previous" && (p === "previous" || p.includes("april") || p.includes("apr") || p.includes("-04"))) shouldInclude = true;
                    if (s === "jan" && (p.includes("jan") || p.includes("-01"))) shouldInclude = true;
                    if (s === "feb" && (p.includes("feb") || p.includes("-02"))) shouldInclude = true;
                    if (s === "mar" && (p.includes("mar") || p.includes("-03"))) shouldInclude = true;
                }

                let pLower = bPeriod.toLowerCase();
                let mIdx = -1;
                if (pLower === "jan" || pLower.includes("-01")) mIdx = 0;
                else if (pLower === "feb" || pLower.includes("-02")) mIdx = 1;
                else if (pLower === "mar" || pLower.includes("-03")) mIdx = 2;
                else if (pLower === "previous" || pLower.includes("april") || pLower.includes("apr") || pLower.includes("-04")) mIdx = 3;
                else if (pLower === "current" || pLower.includes("may") || pLower.includes("-05")) mIdx = 4;
                else if (pLower === "june" || pLower === "jun" || pLower.includes("-06")) mIdx = 5;

                if (mIdx !== -1 && stackedData[bStatus]) {
                    stackedData[bStatus][mIdx] += bAmount;
                }

                if (shouldInclude) {
                    let badgeClass = "badge-pending";
                    if (bStatus === "Paid") badgeClass = "badge-paid";
                    if (bStatus === "Overdue") badgeClass = "badge-overdue";

                    const row = `
                        <tr>
                            <td class="fw-semibold text-dark">${bName}</td>
                            <td class="text-muted small">${bProvider}</td>
                            <td class="fw-bold">RM ${bAmount.toFixed(2)}</td>
                            <td class="text-secondary">${bDate}</td>
                            <td><span class="${badgeClass}">${bStatus}</span></td>
                            <td class="text-center">
                                <button class="btn btn-delete animate-btn" onclick="deleteBill('${bId}')">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;

                    providerCounts[bProvider] = (providerCounts[bProvider] || 0) + 1;
                }
            });

            if (tbody.innerHTML === "") {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No bills found for this period.</td></tr>`;
            }

            generateListCharts(stackedData, providerCounts);
        }

        function generateListCharts(stackedData, providerCounts) {

            const ctxStacked = document.getElementById('stackedStatusChart').getContext('2d');
            if (stackedChartInstance) stackedChartInstance.destroy();

            stackedChartInstance = new Chart(ctxStacked, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'June'],
                    datasets: [
                        { label: 'Paid', data: stackedData['Paid'], backgroundColor: '#6366f1' },
                        { label: 'Pending', data: stackedData['Pending'], backgroundColor: '#f59e0b' },
                        { label: 'Overdue', data: stackedData['Overdue'], backgroundColor: '#f43f5e' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom' } },
                    scales: {
                        x: { stacked: true, grid: { display: false } },
                        y: { stacked: true, beginAtZero: true, grid: { color: '#f1f5f9' } }
                    }
                }
            });

            let pieLabels = Object.keys(providerCounts);
            let pieValues = Object.values(providerCounts);

            if (pieLabels.length === 0) {
                pieLabels = ['No Data'];
                pieValues = [1];
            }

            const ctxPie = document.getElementById('providerPieChart').getContext('2d');
            if (pieChartInstance) pieChartInstance.destroy();

            pieChartInstance = new Chart(ctxPie, {
                type: 'pie',
                data: {
                    labels: pieLabels,
                    datasets: [{
                        data: pieValues,
                        backgroundColor: [
                            '#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#3b82f6', 
                            '#8b5cf6', '#ec4899', '#64748b', '#06b6d4', '#14b8a6'
                        ],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            position: 'right',
                            labels: { boxWidth: 12, font: { size: 11 } }
                        } 
                    }
                }
            });
        }

        function deleteBill(billId) {
            if (confirm("Are you sure you want to delete this bill?")) {
                let bills = JSON.parse(localStorage.getItem("storedBills")) || [];
                bills = bills.filter(bill => bill.id !== billId);
                localStorage.setItem("storedBills", JSON.stringify(bills));
                renderBillsTable();
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }

        renderBillsTable();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
