<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bills - Bill Payment Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .navbar-custom { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; }
        .navbar-custom .navbar-brand { color: #0f172a; font-weight: 700; }
        .navbar-custom .nav-link { color: #64748b; font-weight: 500; }
        .navbar-custom .nav-link.active { color: #6366f1 !important; }
        
        .card-custom { border-radius: 24px; border: none; background-color: #ffffff; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .table-custom th { font-weight: 600; color: #64748b; background-color: #f8fafc; border: none; padding: 16px; }
        .table-custom td { padding: 16px; vertical-align: middle; border-bottom: 1px solid #f1f5f9; }
        
        .btn-add-bill { background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; font-weight: 600; border: none; padding: 10px 20px; border-radius: 12px; transition: all 0.3s ease; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2); }
        .btn-add-bill:hover { background: linear-gradient(135deg, #4338ca, #4f46e5); color: white; transform: translateY(-2px); box-shadow: 0 6px 12px -1px rgba(99, 102, 241, 0.3); }
        
        .badge-paid { background-color: #ecfdf5; color: #059669; border-radius: 8px; padding: 6px 12px; font-weight: 600; font-size: 0.85rem; }
        .badge-pending { background-color: #fffbeb; color: #d97706; border-radius: 8px; padding: 6px 12px; font-weight: 600; font-size: 0.85rem; }
        .badge-overdue { background-color: #fff1f2; color: #e11d48; border-radius: 8px; padding: 6px 12px; font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body>

    <script>
        if (!sessionStorage.getItem("isLoggedIn")) {
            alert("Unauthorized access! Please login first.");
            window.location.href = "index.html";
        }
    </script>

    <nav class="navbar navbar-expand-lg navbar-custom py-3 mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                Bill Payment Tracker
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fa-solid fa-chart-pie me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="bills-list.html"><i class="fa-solid fa-wallet me-1"></i> My Bills</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html"><i class="fa-solid fa-layer-group me-1"></i> Categories</a></li>
                    <li class="nav-item">
                        <button class="btn btn-outline-danger btn-sm rounded-3 px-3 ms-lg-3" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card-custom shadow-sm mb-5">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
                <div>
                    <h2 class="fw-bold mb-1">My Bills</h2>
                    <p class="text-muted small mb-0">Manage and track all your logged utilities.</p>
                </div>
                <div class="d-flex align-items-center gap-3">
                    <a href="add-new-bill.html" class="btn btn-add-bill shadow-sm"><i class="fa-solid fa-plus"></i> Add New Bill</a>
                    
                    <select class="form-select rounded-3 shadow-sm w-auto" id="listPeriodFilter" onchange="renderBillsTable()">
                        <option value="annual" selected>Annual Summary (Jan-May 2026)</option>
                        <option value="current">Current Month (May 2026)</option>
                        <option value="previous">Previous Month (April 2026)</option>
                        <option value="Mar">March 2026</option>
                        <option value="Feb">February 2026</option>
                        <option value="Jan">January 2026</option>
                    </select>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-custom align-middle">
                    <thead>
                        <tr>
                            <th>Bill Name</th>
                            <th>Provider / Category</th>
                            <th>Amount</th>
                            <th>Due Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="billsTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // LOGIK SINKRONISASI: MASUKKAN BACKUP HANYA JIKA LOCALSTORAGE BETUL-BETUL KOSONG
        function initDataIfEmptyInList() {
            const currentData = localStorage.getItem("storedBills");
            if (!currentData || JSON.parse(currentData).length === 0) {
                const freshBackup = [
                    { id: "b1", name: "Maybank Car Loan", provider: "Maybank Islamic / Financial Loans", amount: 191.00, date: "May 10, 2026", period: "current", status: "Paid" },
                    { id: "b2", name: "Unifi Broadband", provider: "Telekom Malaysia / Internet", amount: 129.00, date: "May 15, 2026", period: "current", status: "Paid" },
                    { id: "b3", name: "TNB Electricity", provider: "Tenaga Nasional Berhad / Utility", amount: 150.00, date: "May 28, 2026", period: "current", status: "Paid" },
                    { id: "b4", name: "Coway Water Filter", provider: "Coway Malaysia / Home Appliances", amount: 85.00, date: "May 01, 2026", period: "current", status: "Paid" },
                    { id: "b5", name: "Maybank Car Loan", provider: "Maybank Islamic / Financial Loans", amount: 191.00, date: "Apr 10, 2026", period: "previous", status: "Paid" },
                    { id: "b6", name: "Unifi Broadband", provider: "Telekom Malaysia / Internet", amount: 129.00, date: "Apr 15, 2026", period: "previous", status: "Paid" },
                    { id: "b7", name: "TNB Electricity", provider: "Tenaga Nasional Berhad / Utility", amount: 150.00, date: "Apr 28, 2026", period: "previous", status: "Paid" },
                    { id: "b8", name: "Coway Water Filter", provider: "Coway Malaysia / Home Appliances", amount: 85.00, date: "Apr 01, 2026", period: "previous", status: "Paid" },
                    { id: "b9", name: "Maybank Car Loan", provider: "Maybank Islamic / Financial Loans", amount: 191.00, date: "Mar 10, 2026", period: "Mar", status: "Paid" },
                    { id: "b10", name: "Unifi Broadband", provider: "Telekom Malaysia / Internet", amount: 129.00, date: "Mar 15, 2026", period: "Mar", status: "Paid" },
                    { id: "b11", name: "TNB Electricity", provider: "Tenaga Nasional Berhad / Utility", amount: 150.00, date: "Mar 28, 2026", period: "Mar", status: "Paid" },
                    { id: "b12", name: "Coway Water Filter", provider: "Coway Malaysia / Home Appliances", amount: 85.00, date: "Mar 01, 2026", period: "Mar", status: "Paid" },
                    { id: "b13", name: "Maybank Car Loan", provider: "Maybank Islamic / Financial Loans", amount: 191.00, date: "Feb 10, 2026", period: "Feb", status: "Paid" },
                    { id: "b14", name: "Unifi Broadband", provider: "Telekom Malaysia / Internet", amount: 129.00, date: "Feb 15, 2026", period: "Feb", status: "Paid" },
                    { id: "b15", name: "TNB Electricity", provider: "Tenaga Nasional Berhad / Utility", amount: 150.00, date: "Feb 28, 2026", period: "Feb", status: "Paid" },
                    { id: "b16", name: "Coway Water Filter", provider: "Coway Malaysia / Home Appliances", amount: 85.00, date: "Feb 01, 2026", period: "Feb", status: "Paid" },
                    { id: "b17", name: "Maybank Car Loan", provider: "Maybank Islamic / Financial Loans", amount: 191.00, date: "Jan 10, 2026", period: "Jan", status: "Paid" },
                    { id: "b18", name: "Unifi Broadband", provider: "Telekom Malaysia / Internet", amount: 129.00, date: "Jan 15, 2026", period: "Jan", status: "Paid" },
                    { id: "b19", name: "TNB Electricity", provider: "Tenaga Nasional Berhad / Utility", amount: 150.00, date: "Jan 28, 2026", period: "Jan", status: "Paid" },
                    { id: "b20", name: "Coway Water Filter", provider: "Coway Malaysia / Home Appliances", amount: 85.00, date: "Jan 01, 2026", period: "Jan", status: "Paid" }
                ];
                localStorage.setItem("storedBills", JSON.stringify(freshBackup));
            }
        }

        function renderBillsTable() {
            initDataIfEmptyInList();
            const bills = JSON.parse(localStorage.getItem("storedBills")) || [];
            const selectedPeriod = document.getElementById("listPeriodFilter").value;
            const tbody = document.getElementById("billsTableBody");
            
            tbody.innerHTML = "";

            bills.forEach(bill => {
                let bName = bill.name || bill.billName || "New Bill";
                let bProvider = bill.provider || bill.category || "General";
                let bAmount = parseFloat(bill.amount || bill.billAmount) || 0;
                let bDate = bill.date || bill.dueDate || "May 2026";
                let bStatus = bill.status || "Paid";
                let bPeriod = bill.period || "current";

                let shouldInclude = false;
                if (selectedPeriod === "annual") {
                    shouldInclude = true;
                } else {
                    const p = bPeriod.toLowerCase();
                    const s = selectedPeriod.toLowerCase();
                    if (s === "current" && (p === "current" || p.includes("may") || p.includes("-05"))) shouldInclude = true;
                    if (s === "previous" && (p === "previous" || p.includes("april") || p.includes("apr") || p.includes("-04"))) shouldInclude = true;
                    if (s === "jan" && (p.includes("jan") || p.includes("-01"))) shouldInclude = true;
                    if (s === "feb" && (p.includes("feb") || p.includes("-02"))) shouldInclude = true;
                    if (s === "mar" && (p.includes("mar") || p.includes("-03"))) shouldInclude = true;
                }

                if (shouldInclude) {
                    let badgeClass = "badge-pending";
                    if (bStatus === "Paid") badgeClass = "badge-paid";
                    if (bStatus === "Overdue") badgeClass = "badge-overdue";

                    const row = `
                        <tr>
                            <td class="fw-semibold text-dark">${bName}</td>
                            <td class="text-muted small">${bProvider}</td>
                            <td class="fw-bold">RM ${bAmount.toFixed(2)}</td>
                            <td class="text-secondary">${bDate}</td>
                            <td><span class="${badgeClass}">${bStatus}</span></td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                }
            });

            if (tbody.innerHTML === "") {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">No bills found for this period.</td></tr>`;
            }
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }

        renderBillsTable();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
