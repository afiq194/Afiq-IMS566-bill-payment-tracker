<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories - Bill Payment Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .navbar-custom { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; }
        .navbar-custom .navbar-brand { color: #0f172a; font-weight: 700; }
        .navbar-custom .nav-link { color: #64748b; font-weight: 500; }
        .navbar-custom .nav-link.active { color: #6366f1 !important; }
        
        /* DESIGN ACCORDION ASAL */
        .accordion-premium { border: none; background: transparent; }
        .accordion-premium .accordion-item { border: none; border-radius: 16px !important; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; background-color: #ffffff; }
        .accordion-premium .accordion-button { padding: 20px 24px; font-weight: 600; font-size: 16px; color: #1e293b; background-color: #ffffff; box-shadow: none; border: none; width: 100%; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        .accordion-premium .accordion-button:not(.collapsed) { background-color: #f8fafc; color: #6366f1; }
        
        .sub-list-container { display: none; background-color: #ffffff; border-top: 1px solid #f1f5f9; }
        .sub-list-container.show { display: block; }
        .sub-list-item { padding: 14px 24px; border-bottom: 1px solid #f1f5f9; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .sub-list-item:last-child { border-bottom: none; }
        .chevron-icon { transition: transform 0.2s ease; color: #64748b; }
        .accordion-button:not(.collapsed) .chevron-icon { transform: rotate(180deg); color: #6366f1; }
    </style>
</head>
<body>

    <script>
        if (!sessionStorage.getItem("isLoggedIn")) {
            alert("Unauthorized access! Please login first.");
            window.location.href = "index.html";
        }
    </script>

    <nav class="navbar navbar-expand-lg navbar-custom py-3 mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <span class="text-primary me-2"><i class="fa-solid fa-lightning-charge"></i></span> Bill Payment Tracker
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="fa-solid fa-chart-pie me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="bills-list.html"><i class="fa-solid fa-wallet me-1"></i> My Bills</a></li>
                    <li class="nav-item"><a class="nav-link active" href="categories.html"><i class="fa-solid fa-layer-group me-1"></i> Categories</a></li>
                    <li class="nav-item">
                        <button class="btn btn-outline-danger btn-sm rounded-3 px-3 ms-lg-3" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-4">
            <div class="col-md-10">
                <span class="badge px-3 py-2 rounded-pill mb-2 fw-semibold" style="background-color: #eef2ff; color: #6366f1;">Auto-Generated Grouping</span>
                <h2 class="fw-bold">Tracked Categories</h2>
                <p class="text-muted">Dynamic breakdown of your recurring items categorized automatically.</p>
            </div>
        </div>

        <div class="accordion accordion-premium" id="categoryAccordion"></div>
    </div>

    <script>
        function toggleSection(collapseId, buttonElement) {
            const target = document.getElementById(collapseId);
            if (target.classList.contains('show')) {
                target.classList.remove('show');
                buttonElement.classList.add('collapsed');
            } else {
                target.classList.add('show');
                buttonElement.classList.remove('collapsed');
            }
        }

        function generateDynamicCategories() {
            const bills = JSON.parse(localStorage.getItem("storedBills")) || [];
            const accordionContainer = document.getElementById("categoryAccordion");
            accordionContainer.innerHTML = ""; 

            const mappedCategories = {};
            const uniqueBillTracker = {}; 

            bills.forEach(bill => {
                let rawProvider = (bill.provider || "").trim();
                let detectedCategory = "Uncategorized";

                // LOGIK BARU: Check kalau user masukkan guna format slash ataupun taip seketul terus
                if (rawProvider.includes("/")) {
                    const sections = rawProvider.split("/");
                    if (sections[1] && sections[1].trim() !== "") {
                        detectedCategory = sections[1].trim();
                    } else {
                        detectedCategory = sections[0].trim();
                    }
                } else if (rawProvider !== "") {
                    // Kalau tak ada slash, kita terus ambil input bulat-bulat sebagai nama kategori
                    detectedCategory = rawProvider;
                }

                if (!mappedCategories[detectedCategory]) {
                    mappedCategories[detectedCategory] = [];
                    uniqueBillTracker[detectedCategory] = new Set();
                }

                if (!uniqueBillTracker[detectedCategory].has(bill.name)) {
                    uniqueBillTracker[detectedCategory].add(bill.name);
                    mappedCategories[detectedCategory].push(bill);
                }
            });

            const categoryNames = Object.keys(mappedCategories);

            if (categoryNames.length === 0) {
                accordionContainer.innerHTML = `<div class="text-center py-5 text-muted">No records found.</div>`;
                return;
            }

            categoryNames.forEach((catName, index) => {
                const associatedBills = mappedCategories[catName];
                const cleanCollapseId = `collapse_${index}`;

                const accordionItem = document.createElement("div");
                accordionItem.className = "accordion-item";

                let subListHTML = "";
                associatedBills.forEach(b => {
                    let price = parseFloat(b.amount) || 0;
                    subListHTML += `
                        <div class="sub-list-item">
                            <div class="fw-medium">${b.name}</div>
                            <div class="fw-bold text-dark">RM ${price.toFixed(2)}</div>
                        </div>
                    `;
                });

                accordionItem.innerHTML = `
                    <h2>
                        <button class="accordion-button collapsed" type="button" onclick="toggleSection('${cleanCollapseId}', this)">
                            <span><i class="fa-solid fa-folder me-3 text-secondary"></i> ${catName} (${associatedBills.length})</span>
                            <i class="fa-solid fa-chevron-down chevron-icon"></i>
                        </button>
                    </h2>
                    <div id="${cleanCollapseId}" class="sub-list-container">
                        <div class="p-0">
                            ${subListHTML}
                        </div>
                    </div>
                `;
                accordionContainer.appendChild(accordionItem);
            });
        }

        function logout() { sessionStorage.clear(); window.location.href = "index.html"; }
        generateDynamicCategories();
    </script>
</body>
</html>
