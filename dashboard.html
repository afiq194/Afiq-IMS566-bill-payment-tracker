<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Bill Payment Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .navbar-custom { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; }
        .navbar-custom .navbar-brand { color: #0f172a; font-weight: 700; }
        .navbar-custom .nav-link { color: #64748b; font-weight: 500; }
        .navbar-custom .nav-link.active { color: #6366f1 !important; }
        
        .metric-card { border-radius: 20px; border: none; color: #ffffff; padding: 24px; }
        .bg-paid { background: linear-gradient(135deg, #4f46e5, #6366f1); }
        .bg-pending { background: linear-gradient(135deg, #d97706, #f59e0b); }
        .bg-overdue { background: linear-gradient(135deg, #e11d48, #f43f5e); }
        
        .chart-card { border-radius: 24px; border: none; background-color: #ffffff; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .chart-container { position: relative; width: 100%; height: 360px; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <script>
        if (!sessionStorage.getItem("isLoggedIn")) {
            alert("Unauthorized access! Please login first.");
            window.location.href = "index.html";
        }
    </script>

    <nav class="navbar navbar-expand-lg navbar-custom py-3 mb-5 shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                Bill Payment Tracker
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link active" href="dashboard.html"><i class="fa-solid fa-chart-pie me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="bills-list.html"><i class="fa-solid fa-wallet me-1"></i> My Bills</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html"><i class="fa-solid fa-layer-group me-1"></i> Categories</a></li>
                    <li class="nav-item">
                        <button class="btn btn-outline-danger btn-sm rounded-3 px-3 ms-lg-3" onclick="logout()"><i class="fa-solid fa-arrow-right-from-bracket me-1"></i> Logout</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        
        <div class="row mb-5 align-items-center">
            <div class="col-md-8">
                <h1 class="fw-bold mb-1">Welcome Back, Afiq!</h1>
                <p class="text-muted mb-0">Dynamic analytics generated straight from client storage.</p>
            </div>
            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                <select class="form-select d-inline-block w-auto rounded-3 shadow-sm" id="dashboardPeriodFilter" onchange="calculateDashboardMetrics()">
                    <option value="current">Current Month (May 2026)</option>
                    <option value="previous">Previous Month (April 2026)</option>
                    <option value="Mar">March 2026</option>
                    <option value="Feb">February 2026</option>
                    <option value="Jan">January 2026</option>
                    <option value="annual">Annual Summary (Jan-May 2026)</option>
                </select>
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="metric-card bg-paid shadow-sm">
                    <p class="text-uppercase small fw-bold text-white-50 mb-1">Total Paid</p>
                    <h2 class="fw-bold mb-0" id="dashPaid">RM 0.00</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="metric-card bg-pending shadow-sm">
                    <p class="text-uppercase small fw-bold text-white-50 mb-1">Total Pending</p>
                    <h2 class="fw-bold mb-0" id="dashPending">RM 0.00</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="metric-card bg-overdue shadow-sm">
                    <p class="text-uppercase small fw-bold text-white-50 mb-1">Total Overdue</p>
                    <h2 class="fw-bold mb-0" id="dashOverdue">RM 0.00</h2>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mb-5">
            <div class="col-md-7">
                <div class="chart-card shadow-sm">
                    <div class="chart-container">
                        <canvas id="breakdownChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        let breakdownChartInstance = null;

        function calculateDashboardMetrics() {
            const bills = JSON.parse(localStorage.getItem("storedBills")) || [];
            const selectedPeriod = document.getElementById("dashboardPeriodFilter").value;
            
            let totalPaid = 0;
            let totalPending = 0;
            let totalOverdue = 0;

            bills.forEach(bill => {
                let shouldInclude = false;
                
                if (selectedPeriod === "annual") {
                    shouldInclude = true;
                } else if (bill.period) {
                    const p = bill.period.toLowerCase();
                    const s = selectedPeriod.toLowerCase();
                    
                    if (s === "current" && (p === "current" || p.includes("may") || p.includes("-05"))) shouldInclude = true;
                    if (s === "previous" && (p === "previous" || p.includes("april") || p.includes("-04"))) shouldInclude = true;
                    if (s === "jan" && (p.includes("jan") || p.includes("-01"))) shouldInclude = true;
                    if (s === "feb" && (p.includes("feb") || p.includes("-02"))) shouldInclude = true;
                    if (s === "mar" && (p.includes("mar") || p.includes("-03"))) shouldInclude = true;
                }
                
                if (shouldInclude) {
                    let amt = parseFloat(bill.amount) || 0;
                    if (bill.status === "Paid") totalPaid += amt;
                    if (bill.status === "Pending") totalPending += amt;
                    if (bill.status === "Overdue") totalOverdue += amt;
                }
            });

            document.getElementById("dashPaid").innerText = `RM ${totalPaid.toFixed(2)}`;
            document.getElementById("dashPending").innerText = `RM ${totalPending.toFixed(2)}`;
            document.getElementById("dashOverdue").innerText = `RM ${totalOverdue.toFixed(2)}`;

            renderCharts(totalPaid, totalPending, totalOverdue);
        }

        function renderCharts(paid, pending, overdue) {
            const ctxBreakdown = document.getElementById('breakdownChart').getContext('2d');
            if (breakdownChartInstance) breakdownChartInstance.destroy();
            
            breakdownChartInstance = new Chart(ctxBreakdown, {
                type: 'doughnut',
                data: {
                    labels: ['Paid (RM)', 'Pending (RM)', 'Overdue (RM)'],
                    datasets: [{
                        data: [paid, pending, overdue],
                        backgroundColor: ['#6366f1', '#f59e0b', '#f43f5e'],
                        borderWidth: 4,
                        borderColor: '#ffffff'
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    }
                }
            });
        }

        function logout() {
            sessionStorage.clear();
            window.location.href = "index.html";
        }

        calculateDashboardMetrics();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
