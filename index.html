<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bill Payment Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #ffffff;
            border-radius: 24px;
            border: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 440px;
            padding: 50px 40px;
        }
        .btn-primary-custom {
            background-color: #6366f1;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s ease;
        }
        .btn-primary-custom:hover {
            background-color: #4f46e5;
        }
        .form-control-custom {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            color: #1e293b;
        }
        .form-control-custom::placeholder {
            color: #94a3b8;
        }
        .form-control-custom:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }
        .form-label-custom {
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">

            <h1 class="fw-bold text-dark mb-2" style="font-size: 32px; letter-spacing: -0.5px;">
                <i class="fa-solid fa-wallet me-2" style="color: #6366f1;"></i>Bill Payment Tracker
            </h1>
            <p class="text-muted small">Log in to manage your personal statements</p>
        </div>

        <form id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label form-label-custom">Username</label>
                <input type="text" class="form-control form-control-custom" id="username" placeholder="Enter your username" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label form-label-custom">Password</label>
                <input type="password" class="form-control form-control-custom" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100 text-white">Log In</button>
            
            <div class="text-center mt-3">
                <small style="color: #64748b; font-size: 0.85rem; display: block; line-height: 1.5;">
                    <strong>Demo Access for Evaluation:</strong><br>
                    Username: <code style="color: #6366f1; font-weight: 600;">user</code> | Password: <code style="color: #6366f1; font-weight: 600;">123</code><br>
                    <span style="color: #10b981; font-size: 0.78rem; font-weight: 500;">💡 Tip: Type any new username & password to register instantly!</span>
                </small>
            </div>
        </form>
    </div>

    <script>
        if (!localStorage.getItem("tracker_users")) {
            const defaultUser = { "user": "123" };
            localStorage.setItem("tracker_users", JSON.stringify(defaultUser));
        }

        document.getElementById("loginForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById("username").value.trim().toLowerCase();
            const passwordInput = document.getElementById("password").value;

            if (!usernameInput || !passwordInput) return;

            let registeredUsers = JSON.parse(localStorage.getItem("tracker_users"));

            if (registeredUsers[usernameInput] !== undefined) {
                if (registeredUsers[usernameInput] === passwordInput) {
                    sessionStorage.setItem("isLoggedIn", "true");
                    
                    const formattedUser = usernameInput.charAt(0).toUpperCase() + usernameInput.slice(1);
                    sessionStorage.setItem("currentUser", formattedUser); 
                    
                    window.location.href = "dashboard.html";
                } else {
                    alert("Username atau Password salah, bro! Cuba lagi.");
                }
            } 
                
            else {
                registeredUsers[usernameInput] = passwordInput;
                localStorage.setItem("tracker_users", JSON.stringify(registeredUsers));

                sessionStorage.setItem("isLoggedIn", "true");
                const formattedUser = usernameInput.charAt(0).toUpperCase() + usernameInput.slice(1);
                sessionStorage.setItem("currentUser", formattedUser); 

                alert("Akaun '" + formattedUser + "' berjaya didaftarkan secara automatik! Membuka dashboard kosong...");
                window.location.href = "dashboard.html";
            }
        });
    </script>
</body>
</html>
